services:
  xcsoar-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DISPLAY: ${DISPLAY}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-wayland-0}
      XDG_RUNTIME_DIR: /mnt/wslg/runtime-dir
      PULSE_SERVER: /mnt/wslg/PulseServer   # optional, for audio
    command: /opt/xcsoar/output/UNIX/bin/xcsoar
    volumes:
      - ../../:/opt/xcsoar
      - xcsoar-ccache:/root/.ccache
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ../../XCSoarData:/root/.xcsoar 
      - /mnt/wslg:/mnt/wslg                 # WSLg runtime (Wayland + audio)
    network_mode: host
    stdin_open: true
    tty: true

volumes:
  xcsoar-ccache:

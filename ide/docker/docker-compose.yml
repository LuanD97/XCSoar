services:
  xcsoar-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DISPLAY: ${DISPLAY}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-wayland-0}
      XDG_RUNTIME_DIR: /mnt/wslg/runtime-dir
      PULSE_SERVER: /mnt/wslg/PulseServer   # optional, for audio
    volumes:
      - ../../:/opt/xcsoar
      - ${HOME}/.ccache:/opt/xcsoar/.ccache
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /mnt/wslg:/mnt/wslg                 # WSLg runtime (Wayland + audio)
    devices:
      - /dev/dri:/dev/dri                   # GPU access for OpenGL
    network_mode: host
    stdin_open: true
    tty: true